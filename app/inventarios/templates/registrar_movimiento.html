{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">
                    Movimiento - {{ material.nombre }}
                </h4>
            </div>

            <div class="card-body">

                <p><strong>Stock actual:</strong> {{ material.stock_actual }} {{ material.unidad_medida }}</p>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select name="tipo" class="form-select" required>
                            <option value="entrada">Entrada</option>
                            <option value="salida">Salida</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cantidad</label>
                        <input type="number" step="0.01"
                               name="cantidad"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Motivo</label>
                        <input type="text"
                               name="motivo"
                               class="form-control"
                               placeholder="Compra proveedor, Uso en producción...">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('inventarios.listar_materiales') }}"
                           class="btn btn-secondary">
                           Cancelar
                        </a>

                        <button type="submit"
                                class="btn btn-success">
                            Registrar
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
