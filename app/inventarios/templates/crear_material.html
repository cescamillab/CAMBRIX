{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Nuevo Material</h4>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <input type="text" name="categoria" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Unidad de Medida</label>
                        <input type="text" name="unidad" class="form-control"
                               placeholder="metros, litros, unidades, láminas...">
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stock Inicial</label>
                            <input type="number" step="0.01" name="stock"
                                   class="form-control" value="0">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stock Mínimo</label>
                            <input type="number" step="0.01" name="stock_minimo"
                                   class="form-control" value="0">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Costo Unitario</label>
                            <input type="number" step="0.01" name="costo"
                                   class="form-control" value="0">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('inventarios.listar_materiales') }}"
                           class="btn btn-secondary">
                           Cancelar
                        </a>

                        <button type="submit" class="btn btn-success">
                            Guardar Material
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
