{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Editar Material</h4>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre"
                               class="form-control"
                               value="{{ material.nombre }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <input type="text" name="categoria"
                               class="form-control"
                               value="{{ material.categoria }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Unidad de Medida</label>
                        <input type="text" name="unidad"
                               class="form-control"
                               value="{{ material.unidad_medida }}">
                    </div>

                    <div class="row">
                        <!-- Con esto linea de abajo se modifica de manera manual(cambio en routes.py y editar_material.html(aqui))
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stock Actual</label>
                        
                            <input type="number" step="0.01" name="stock"
                                   class="form-control"
                                   value="{{ material.stock_actual }}">    
                        </div>  -->

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stock Mínimo</label>
                            <input type="number" step="0.01" name="stock_minimo"
                                   class="form-control"
                                   value="{{ material.stock_minimo }}">  
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Costo Unitario</label>
                            <input type="number" step="0.01" name="costo"
                                   class="form-control"
                                   value="{{ material.costo_unitario }}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('inventarios.listar_materiales') }}"
                           class="btn btn-secondary">
                           Volver
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Actualizar
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
