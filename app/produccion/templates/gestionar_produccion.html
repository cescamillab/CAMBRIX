{% extends "base.html" %}
{% block content %}

<h3>Producción - Pedido #{{ pedido.id }}</h3>

<div class="card mb-4">
    <div class="card-body">

        <form method="POST" class="row g-3">

            <div class="col-md-5">
                <select name="material_id" class="form-select" required>
                    <option value="">Seleccionar material</option>
                    {% for m in materiales %}
                        <option value="{{ m.id }}">
                            {{ m.nombre }} (Stock: {{ m.stock_actual }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <input type="number" step="0.01"
                       name="cantidad"
                       class="form-control"
                       placeholder="Cantidad"
                       required>
            </div>

            <div class="col-md-2">
                <button type="submit"
                        class="btn btn-success w-100">
                    Agregar
                </button>
            </div>

        </form>

    </div>
</div>

<h5>Materiales utilizados</h5>

<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>Material</th>
            <th>Cantidad</th>
            <th>Costo Unitario</th>
            <th>Costo Total</th>
        </tr>
    </thead>
    <tbody>
        {% for u in usados %}
        <tr>
            <td>{{ u.nombre }}</td>
            <td>{{ u.cantidad_usada }}</td>
            <td>${{ u.costo_unitario }}</td>
            <td>${{ u.costo_total }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
